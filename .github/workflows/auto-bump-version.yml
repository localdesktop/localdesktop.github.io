name: Auto bump version from PR labels

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review
      - closed
    branches:
      - main

permissions:
  pull-requests: read

jobs:
  classify-pr:
    name: Classify PR
    runs-on: ubuntu-latest
    outputs:
      gh_pages_only: ${{ steps.filter.outputs.gh_pages_only }}

    steps:
      - name: Detect gh-pages-only changes
        id: filter
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const ghPagesOnly =
              files.length > 0 &&
              files.every((file) => file.filename.startsWith("gh-pages/"));

            core.setOutput("gh_pages_only", ghPagesOnly ? "true" : "false");

  validate-release-label:
    name: Validate Release Label
    needs: classify-pr
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Skip label validation for gh-pages-only PRs
        if: needs.classify-pr.outputs.gh_pages_only == 'true'
        run: echo "gh-pages-only PR; no release label required."

      - name: Require exactly one release label
        if: needs.classify-pr.outputs.gh_pages_only != 'true'
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          python <<'PY'
          import json
          import os

          release_labels = [
              'release:breaking',
              'release:feature',
              'release:bugfix',
          ]
          labels = {item['name'] for item in json.loads(os.environ['LABELS_JSON'])}
          selected = [label for label in release_labels if label in labels]

          if len(selected) != 1:
              print('PRs to main must have exactly one release label:')
              print('  - release:breaking')
              print('  - release:feature')
              print('  - release:bugfix')
              print(f'Found: {selected or "none"}')
              raise SystemExit(1)

          print(f'Using release label: {selected[0]}')
          PY

  bump-version:
    name: Bump Version
    needs: classify-pr
    if: github.event.action == 'closed' && github.event.pull_request.merged == true && needs.classify-pr.outputs.gh_pages_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: read

    steps:
      - name: Decide bump level from PR labels
        id: level
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          python <<'PY'
          import json
          import os

          release_labels = {
              'release:breaking': 'major',
              'release:feature': 'minor',
              'release:bugfix': 'patch',
          }
          labels = {item['name'] for item in json.loads(os.environ['LABELS_JSON'])}
          selected = [label for label in release_labels if label in labels]

          if len(selected) != 1:
              raise SystemExit(
                  'Expected exactly one release label: '
                  'release:breaking, release:feature, or release:bugfix'
              )

          level = release_labels[selected[0]]

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f'level={level}\n')
          PY

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version in Cargo.toml
        id: bump
        env:
          BUMP_LEVEL: ${{ steps.level.outputs.level }}
        run: |
          python <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          level = os.environ['BUMP_LEVEL']
          path = Path('Cargo.toml')
          text = path.read_text(encoding='utf-8')

          def parse_version(raw):
              match = re.fullmatch(r'v?(\d+)\.(\d+)\.(\d+)', raw.strip())
              if not match:
                  return None
              return tuple(map(int, match.groups()))

          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text, re.M)
          if not match:
              raise SystemExit('Could not find version in Cargo.toml')

          manifest_version = tuple(map(int, match.groups()))

          tags = subprocess.run(
              ['git', 'tag', '--list', 'v*.*.*', '--sort=-v:refname'],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.splitlines()

          latest_tag_version = None
          for tag in tags:
              parsed = parse_version(tag)
              if parsed is not None:
                  latest_tag_version = parsed
                  break

          base_version = manifest_version
          if latest_tag_version is not None:
              base_version = max(manifest_version, latest_tag_version)

          major, minor, patch = base_version

          if level == 'major':
              major += 1
              minor = 0
              patch = 0
          elif level == 'minor':
              minor += 1
              patch = 0
          else:
              patch += 1

          new_version = f'{major}.{minor}.{patch}'
          new_text = re.sub(
              r'^version\s*=\s*"\d+\.\d+\.\d+"',
              f'version = "{new_version}"',
              text,
              count=1,
              flags=re.M,
          )

          path.write_text(new_text, encoding='utf-8')
          print(f'Base version: {".".join(map(str, base_version))}')
          print(f'New version: {new_version}')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f'new_version={new_version}\n')
          PY

      - name: Prepare release notes
        id: notes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python <<'PY'
          import os
          import subprocess
          from pathlib import Path

          pr_body = (os.environ.get("PR_BODY") or "").strip()
          if pr_body:
              notes = pr_body
          else:
              notes = subprocess.run(
                  ["git", "log", "-1", "--pretty=%B"],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.strip()

          notes_path = Path(os.environ["RUNNER_TEMP"]) / "release-notes.md"
          notes_path.write_text(notes + "\n", encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"path={notes_path}\n")
          PY

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: prepare release v${{ steps.bump.outputs.new_version }}"

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -F "${{ steps.notes.outputs.path }}"
          git push origin "refs/tags/v${{ steps.bump.outputs.new_version }}"

      - name: Trigger build workflow
        env:
          TAG: v${{ steps.bump.outputs.new_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build.yml --ref "$TAG"
