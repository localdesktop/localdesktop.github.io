icon: assets/icon.png
android:
  assets:
    - assets/setup-progress.html
    - assets/unsupported.html
    - assets/ld-linux-aarch64.so.1
  runtime_libs:
    - assets/libs
  gradle: true
  manifest:
    package: app.polarbear
    sdk:
      min_sdk_version: 21
      target_sdk_version: 33
    application:
      label: "Local Desktop"
      extract_native_libs: true # Required for proot invocations
      use_cleartext_traffic: true # Required for connecting to ws://127.0.0.1, see assets/setup-progress.html
      services:
        - name: app.polarbear.KeyboardAccessibilityService
          permission: android.permission.BIND_ACCESSIBILITY_SERVICE
          label: "@string/keyboard_service_label"
          enabled: true
          exported: false
          intent_filters:
            - actions:
                - android.accessibilityservice.AccessibilityService
          meta_data:
            - name: android.accessibilityservice
              resource: "@xml/keyboard_accessibility_service"
      meta_data:
        - name: com.samsung.android.dex.launchwidth
          value: 0
        - name: com.samsung.android.dex.launchheight
          value: 0
        - name: com.samsung.android.sdk.multiwindow.dex.launchwidth
          value: 0
        - name: com.samsung.android.sdk.multiwindow.dex.launchheight
          value: 0
    uses_permission:
      - name: android.permission.INTERNET
      - name: android.permission.ACCESS_NETWORK_STATE
      - name: android.permission.POST_NOTIFICATIONS
      - name: android.permission.MANAGE_EXTERNAL_STORAGE
      - name: android.permission.READ_EXTERNAL_STORAGE
      - name: android.permission.WRITE_EXTERNAL_STORAGE
        max_sdk_version: 28
    uses_feature:
      - name: android.hardware.type.pc
        required: false
